name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run formatting check
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

  build:
    name: Build ${{ matrix.display_name }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            display_name: Linux x64
            target: x86_64-unknown-linux-gnu
            archive_suffix: x86_64-unknown-linux-gnu
            binary_name: buddy_cast
            package_kind: tar
          - runner: windows-latest
            display_name: Windows x64
            target: x86_64-pc-windows-msvc
            archive_suffix: x86_64-pc-windows-msvc
            binary_name: buddy_cast.exe
            package_kind: zip
          - runner: macos-latest
            display_name: macOS Apple Silicon
            target: aarch64-apple-darwin
            archive_suffix: aarch64-apple-darwin
            binary_name: buddy_cast
            package_kind: tar
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release directory
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          cp LICENSE dist/

      - name: Package Unix archive
        if: matrix.package_kind == 'tar'
        shell: bash
        run: |
          archive_name="buddy_cast-${GITHUB_REF_NAME}-${{ matrix.archive_suffix }}.tar.gz"
          tar -C dist -czf "$archive_name" .
          echo "ARCHIVE_NAME=$archive_name" >> "$GITHUB_ENV"

      - name: Package Windows archive
        if: matrix.package_kind == 'zip'
        shell: pwsh
        run: |
          $archiveName = "buddy_cast-${env:GITHUB_REF_NAME}-${{ matrix.archive_suffix }}.zip"
          Compress-Archive -Path dist\* -DestinationPath $archiveName
          "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.display_name }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
